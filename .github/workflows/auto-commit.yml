name: Auto Commit Daily

on:
  schedule:
    - cron: "0 */3 * * *"   # runs every 3 hours
  workflow_dispatch:        # manual trigger option

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set Git config
        run: |
          git config user.name "roshaniist"
          git config user.email "kumarroshan62013@gmail.com"

      - name: Create/Update file
        run: |
          echo "Commit at $(date)" >> log.txt

      - name: Commit changes
        run: |
          git add .
          git commit -m "Update log $(date)" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push